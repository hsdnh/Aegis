project: restore-test
schedule: "*/30 * * * *"
collectors:
  redis: []
  mysql: []
  http:
    - url: "http://127.0.0.1:65534/health"
      timeout: 2
  log: []
rules:
  - name: "API down"
    metric_name: "http.response.alive"
    operator: "=="
    threshold: 0
    severity: "critical"
    message: "API unavailable"
ai:
  enabled: false
alerts:
  console: {}
storage:
  enabled: true
  path: "C:/Users/10031/Desktop/ai创业/ai-ops-agent/data/tmp-restore-test.db"
