name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            suffix: linux-amd64
          - goos: linux
            goarch: arm64
            suffix: linux-arm64

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Install cross-compiler (arm64)
        if: matrix.goarch == 'arm64'
        run: sudo apt-get update && sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Build agent
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 1
          CC: ${{ matrix.goarch == 'arm64' && 'aarch64-linux-gnu-gcc' || 'gcc' }}
        run: |
          VERSION=${GITHUB_REF_NAME}
          LDFLAGS="-s -w -X main.version=${VERSION}"
          go build -ldflags "${LDFLAGS}" -o ai-ops-agent-${{ matrix.suffix }} ./cmd/agent/

      - name: Build instrument (no CGO)
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          go build -ldflags "-s -w" -o ai-ops-agent-instrument-${{ matrix.suffix }} ./cmd/instrument/

      - name: Build init (no CGO)
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          go build -ldflags "-s -w" -o ai-ops-agent-init-${{ matrix.suffix }} ./cmd/init/

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: binaries-${{ matrix.suffix }}
          path: ai-ops-agent-*-${{ matrix.suffix }}

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Collect binaries
        run: |
          mkdir -p release
          find artifacts -type f -name "ai-ops-agent-*" -exec cp {} release/ \;
          cp install.sh release/
          cp config.yaml release/config.example.yaml
          cd release && sha256sum * > checksums.txt

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          generate_release_notes: true
          body: |
            ## Quick Install

            ```bash
            curl -sS -O https://raw.githubusercontent.com/${{ github.repository }}/main/install.sh
            chmod +x install.sh && sudo ./install.sh
            ```

            ## Docker

            ```bash
            docker pull ghcr.io/${{ github.repository }}:${{ github.ref_name }}
            ```

            ## Manual Download

            Download the binary for your platform below, then:
            ```bash
            chmod +x ai-ops-agent-linux-amd64
            ./ai-ops-agent-linux-amd64 -config config.yaml -dashboard :9090
            ```
